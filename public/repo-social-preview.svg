  <circle cx="120" cy="590" r="180" fill="#1D4ED8" fill-opacity="0.14"/>

  <g filter="url(#shadow)">
    <rect x="70" y="64" width="1060" height="502" rx="30" fill="url(#card)" stroke="#334155"/>
