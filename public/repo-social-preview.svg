    <rect x="802" y="192" width="204" height="16" rx="8" fill="#1D4ED8" fill-opacity="0.9"/>
    <rect x="802" y="228" width="164" height="14" rx="7" fill="#334155"/>
    <rect x="802" y="258" width="188" height="14" rx="7" fill="#334155"/>
