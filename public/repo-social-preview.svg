  <text x="118" y="338" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24">Next.js standalone bundle • Stripe billing • Admin-managed pricing</text>
  <text x="118" y="378" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24">Portable deployment scripts • Local/OpenRouter LLM backends • Prisma</text>

