name: Release Portable Bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://localhost:3000
      PUBLIC_APP_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Prisma schema
        run: |
          npx prisma generate
          npx prisma db push

      - name: Validate
        run: |
          npm run lint
          npm test
          npx tsc --noEmit
          npm run build

      - name: Build portable artifacts
        run: npm run package:portable

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*SHA256SUMS.txt
          generate_release_notes: true
